# Docker Compose for local development
version: '3.8'

services:
  # Application
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/planning_checklist
      - NUXT_SESSION_SECRET=dev-secret-change-in-production-min-32-chars!!
      - NUXT_PUBLIC_APP_URL=http://localhost:3000
      - NUXT_ENTRA_CLIENT_ID=${NUXT_ENTRA_CLIENT_ID:-}
      - NUXT_ENTRA_CLIENT_SECRET=${NUXT_ENTRA_CLIENT_SECRET:-}
      - NUXT_ENTRA_TENANT_ID=${NUXT_ENTRA_TENANT_ID:-common}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - planning-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: planning_checklist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d planning_checklist"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - planning-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  planning-network:
    driver: bridge
